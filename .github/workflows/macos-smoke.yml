name: macOS smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Byte-compile
        run: python -m py_compile kokoro_gui.py

      - name: Import (tkinter + module load)
        run: python -c "import tkinter; import kokoro_gui; print('ok')"
